<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Model Explorer ONNX</title>
  </head>
  <body>
    <main id="app">
      <aside id="left-panel" class="model-list">
        <div class="side-header">
          <button id="sidebar-toggle" class="ghost-btn" title="Toggle sidebar">
            <i data-lucide="panel-left-close"></i>
          </button>
          <div class="side-title">
            <i data-lucide="boxes"></i>
            <span>Models</span>
          </div>
          <div class="side-header-actions">
            <label id="add-files-btn" class="ghost-btn" for="model-file" title="Add model files">
              <i data-lucide="plus"></i>
            </label>
            <button id="debug-toggle" class="ghost-btn" title="Toggle debug logs">
              <i data-lucide="terminal-square"></i>
            </button>
          </div>
          <input
            id="model-file"
            class="hidden-file-input"
            type="file"
            multiple
            accept=".onnx,.onnxtxt,.onnxtext,.textproto,.json,.onnxjson"
          />
        </div>
        <div id="model-list"></div>
        <pre id="debug-log" class="debug-log hidden"></pre>
      </aside>
      <section id="viewer-shell" class="viewer-shell"></section>
      <button id="sidebar-fab" class="sidebar-fab hidden" title="Open models panel">
        <i data-lucide="panel-left-open"></i>
      </button>
    </main>
    <div id="drop-overlay" class="drop-overlay hidden">
      <div class="drop-overlay-card">
        <i data-lucide="upload-cloud"></i>
        <span>Drop ONNX files anywhere to load</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
